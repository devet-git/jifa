<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="jf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="40" height="40" rx="9" fill="url(#jf-bg)"/>
  <g stroke="white" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Combined J+F: F's left vertical → top bar (shared with J cap) → J's vertical → J hook -->
    <path d="M9.5,32 L9.5,8 L29,8 L29,26 C29,34 18,35 16,29"/>
    <!-- F's middle horizontal bar -->
    <line x1="9.5" y1="20" x2="20" y2="20"/>
  </g>
</svg>
